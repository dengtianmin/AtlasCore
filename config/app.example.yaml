app:
  name: AtlasCore API
  version: 0.1.0
  env: development
  host: 0.0.0.0
  port: 8000
  log_level: INFO
  api_v1_prefix: ""

admin:
  initial_username: admin

defaults:
  page:
    admin_dashboard_size: 20
    document_list_size: 50
    root_download_entry: latest_export
  features:
    enable_graph_api: true
    enable_debug_endpoints: true
    enable_csv_export: true
    enable_root_debug_page: true
    graph_reload_on_start: true
  mappings:
    document_source_labels:
      upload: Uploaded file
      dify: Dify knowledge base

export:
  rules:
    qa_logs:
      delimiter: ","
      include_header: true
      filename_prefix: qa_logs

graph:
  default_limit: 100
  max_neighbors: 200
  export_dir: ./data/graph_exports
  import_dir: ./data/graph_imports
  instance_local_path: ./data/atlascore_graph.db
  instance_id: atlascore-instance-local
  db_version: atlascore-graph-v1
  snapshot_path: ./data/atlascore_graph.db

integrations:
  neo4j:
    enabled: false
    database: neo4j
  dify:
    enabled: false
    base_url: null
    timeout_seconds: 15
  jwt:
    enabled: true
